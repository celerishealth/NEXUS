services:
  postgres:
    image: postgres:16-alpine
    restart: "no"

    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_local_security
      POSTGRES_DB: nexus_security

    ports:
      - "127.0.0.1:55432:5432"

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U nexus -d nexus_security
      interval: 2s
      timeout: 3s
      retries: 30

    tmpfs:
      - /var/lib/postgresql/data

    security_opt:
      - no-new-privileges:true
