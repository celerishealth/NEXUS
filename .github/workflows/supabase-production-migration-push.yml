name: Supabase Production Migration Push

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type APPLY 18 NEXUS MIGRATIONS
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: nexus-supabase-production-migration-push
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply and verify 18 migrations
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: nexus-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Verify explicit owner confirmation
        shell: bash
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail

          if [[ "${CONFIRMATION}" != "APPLY 18 NEXUS MIGRATIONS" ]]; then
            echo "::error::Exact migration confirmation was not provided."
            exit 1
          fi

          echo "OWNER MIGRATION AUTHORIZATION: VERIFIED"

      - name: Reinforce secret masking
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set +x
          echo "::add-mask::${SUPABASE_ACCESS_TOKEN}"
          echo "::add-mask::${SUPABASE_DB_PASSWORD}"

      - name: Verify permanent migration security contract
        shell: bash
        run: |
          set -euo pipefail
          node --test tests/supabaseMigrationSecurityGate.test.mjs
          node scripts/nexus-supabase-migration-security-gate.mjs

      - name: Link NEXUS Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref cvtjcysatndfzkszufen

      - name: Record pre-push migration history
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase migration list --linked

      - name: Final remote migration dry run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --linked --include-all --dry-run

      - name: Apply 18 NEXUS migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --linked --include-all --yes

      - name: Verify post-push migration history
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase migration list --linked

      - name: Verify remote applied catalog security
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGOPTIONS: "-c default_transaction_read_only=on"
        run: supabase db query --linked --file supabase/tests/applied_catalog_security_gate.sql
