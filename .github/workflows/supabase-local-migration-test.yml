name: Supabase Local Migration Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-migration-test:
    name: Apply migrations to isolated local database
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: nexus-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Stage exact remote RLS guard compatibility fixture
        shell: bash
        run: |
          fixture_source="supabase/test-fixtures/remote_rls_guard_compatibility.sql"
          fixture_target="supabase/migrations/0000_remote_rls_guard_fixture.sql"

          echo "1c32e8c8c0214961f000f3db7e3bea7bc214b2f2b0a7d349079232c8e7d4942f  $fixture_source" | sha256sum --check -
          cp "$fixture_source" "$fixture_target"
          echo "1c32e8c8c0214961f000f3db7e3bea7bc214b2f2b0a7d349079232c8e7d4942f  $fixture_target" | sha256sum --check -

      - name: Start isolated local database
        run: supabase db start

      - name: Verify local migration history
        run: supabase migration list --local

      - name: Collect full local database lint report
        id: database_lint
        shell: bash
        run: |
          set +e
          supabase db lint --local --level error --fail-on error 2>&1 | tee supabase-lint-report.txt
          lint_exit_code=${PIPESTATUS[0]}

          {
            echo "## Supabase local database lint report"
            echo
            echo '```text'
            cat supabase-lint-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "exit_code=${lint_exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Enforce local database lint result
        if: steps.database_lint.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "Supabase database lint reported errors. Review the complete report above."
          exit 1

      - name: Clean up isolated database
        if: always()
        continue-on-error: true
        run: supabase stop --no-backup
