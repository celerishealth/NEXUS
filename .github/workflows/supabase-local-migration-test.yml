name: Supabase Local Migration Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-migration-test:
    name: Apply migrations to isolated local database
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: nexus-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Start isolated local database
        run: supabase db start

      - name: Verify local migration history
        run: supabase migration list --local

      - name: Lint local database
        run: supabase db lint --local --level error --fail-on error

      - name: Clean up isolated database
        if: always()
        continue-on-error: true
        run: supabase stop --no-backup
