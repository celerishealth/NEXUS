name: Supabase Remote Catalog Verification

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type VERIFY APPLIED NEXUS CATALOG
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: nexus-supabase-remote-catalog-verification
  cancel-in-progress: false

jobs:
  verify:
    name: Verify already-applied catalog read-only
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: nexus-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Verify explicit owner confirmation
        shell: bash
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail

          if [[ "${CONFIRMATION}" != "VERIFY APPLIED NEXUS CATALOG" ]]; then
            echo "::error::Exact remote catalog verification confirmation was not provided."
            exit 1
          fi

          echo "OWNER READ-ONLY VERIFICATION AUTHORIZATION: VERIFIED"

      - name: Reinforce secret masking
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set +x
          echo "::add-mask::${SUPABASE_ACCESS_TOKEN}"
          echo "::add-mask::${SUPABASE_DB_PASSWORD}"

      - name: Verify read-only workflow contract
        shell: bash
        run: |
          set -euo pipefail
          node --test tests/supabaseRemoteCatalogVerification.test.mjs

      - name: Link NEXUS Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref cvtjcysatndfzkszufen

      - name: Verify already-applied migration history
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          supabase migration list --linked
          echo "APPLIED MIGRATION HISTORY: VERIFIED"

      - name: Verify remote applied catalog in explicit read-only transaction
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          supabase db query --linked --file supabase/tests/applied_catalog_security_gate.sql
          echo "REMOTE APPLIED CATALOG VERIFICATION: PASS"
